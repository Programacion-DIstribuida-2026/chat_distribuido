version: '3.9'

services:
  mongodb:
    image: mongo:latest
    container_name: chat_mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: 123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: chat_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      # Esto es para que el panel sepa a quién hablarle internamente
      - ME_CONFIG_MONGODB_SERVER=mongodb 
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=123
      - ME_CONFIG_BASICAUTH_USERNAME=admin
      - ME_CONFIG_BASICAUTH_PASSWORD=123
    depends_on:
      - mongodb

  redis:
    image: redis:latest
    container_name: chat_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo_data: