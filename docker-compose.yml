services:
  mongodb:
    image: mongo:7.0
    container_name: chat_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: "123"
    ports:
      # Puerto del host configurable (.env junto a este archivo): si Docker da "expose 500", prueba otro o reinicia Docker/WSL.
      - "${MONGO_HOST_PORT:-37117}:27017"
    volumes:
      - mongo_data:/data/db

  mongo-express:
    image: mongo-express:1.0.2
    container_name: chat_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: "123"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: "123"
    depends_on:
      - mongodb

  redis:
    image: redis:7.4-alpine
    container_name: chat_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo_data:
